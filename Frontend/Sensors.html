<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrap-E Sensors</title>

    <link rel="stylesheet" href="./Style/scrap_e.css">

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="./Scripts/scrap_e.js"></script>
</head>

<body data-page="sensors">
    <header class="header">
        <div class="header-spacer"></div>

        <h1 class="logo">SENSORS</h1>

        <button class="menu-button js-menu-button" aria-label="Open navigation menu">
            <span class="menu-button__line"></span>
            <span class="menu-button__line"></span>
            <span class="menu-button__line"></span>
        </button>
    </header>

    <nav class="mobile-menu js-mobile-menu">
        <div class="mobile-menu-top">
            <button class="close-button js-menu-close" aria-label="Close navigation menu">
                <span class="close-button__line close-button__line--one"></span>
                <span class="close-button__line close-button__line--two"></span>
            </button>
        </div>

        <div class="mobile-menu-links">
            <a href="./index.html" class="mobile-menu-link">HOME</a>
            <a href="./Sensors.html" class="mobile-menu-link">SENSOR DATA</a>
            <a href="./animations.html" class="mobile-menu-link">ANIMATIONS</a>
        </div>
    </nav>

    <main class="main">
        <section class="sensor-card">
            <h2 class="sensor-card__title">DHT11 SENSOR</h2>

            <div class="chart-wrapper">
                <canvas id="dht11Chart"></canvas>
            </div>
        </section>
        <section class="sensor-card">
            <h2 class="sensor-card__title">BATTERY VOLTAGE</h2>

            <div class="chart-wrapper">
                <canvas id="batteryChart"></canvas>
            </div>
        </section>
        <section class="sensor-card">
            <h2 class="sensor-card__title">CO2 SENSOR</h2>

            <div class="co2-quality-box co2-quality-box--unknown js-co2-quality-box">
                Waiting for CO2 data...
            </div>

            <div class="chart-wrapper">
                <canvas id="co2Chart"></canvas>
            </div>
        </section>
        <section class="sensor-card">
            <h2 class="sensor-card__title">LIGHT SENSOR</h2>

            <div class="chart-wrapper">
                <canvas id="ldrChart"></canvas>
            </div>
        </section>
        <section class="sensor-card">
            <h2 class="sensor-card__title">GPS SENSOR</h2>

            <div class="sensor-table-wrapper">
                <table class="sensor-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Latitude</th>
                            <th>Longitude</th>
                        </tr>
                    </thead>

                    <tbody class="js-gps-table">
                        <!-- JavaScript fills this -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>

</html>
